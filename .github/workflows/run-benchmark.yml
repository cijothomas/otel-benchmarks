name: run-benchmark

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language harness to run'
        required: true
        type: choice
        default: dotnet
        options:
          - dotnet
          - rust
      version:
        description: 'Package version to measure (e.g. 10.0.8 for System.Diagnostics.DiagnosticSource, 0.32.0 for opentelemetry)'
        required: true
        type: string
        default: '10.0.8'

permissions:
  contents: write
  deployments: write

jobs:
  dotnet:
    if: inputs.language == 'dotnet'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run BenchmarkDotNet
        working-directory: harnesses/dotnet/OtelBenchmarks.Dotnet
        run: |
          dotnet run -c Release \
            -p:SystemDiagnosticsDiagnosticSourceVersion=${{ inputs.version }} \
            -- --exporters json --filter '*'

      - name: Locate report
        id: locate
        working-directory: harnesses/dotnet/OtelBenchmarks.Dotnet
        run: |
          report=$(ls BenchmarkDotNet.Artifacts/results/*-report-full-compressed.json | head -n1)
          echo "report=$report" >> "$GITHUB_OUTPUT"
          echo "Found report: $report"

      - name: Publish to dashboard
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'dotnet / S1 (System.Diagnostics.DiagnosticSource ${{ inputs.version }})'
          tool: 'benchmarkdotnet'
          output-file-path: harnesses/dotnet/OtelBenchmarks.Dotnet/${{ steps.locate.outputs.report }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: 'dev/bench'

  rust:
    if: inputs.language == 'rust'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Pin opentelemetry version
        working-directory: harnesses/rust
        run: |
          sed -i 's|^opentelemetry = .*|opentelemetry = "${{ inputs.version }}"|' Cargo.toml
          grep '^opentelemetry' Cargo.toml

      - name: Run Criterion benchmark
        working-directory: harnesses/rust
        run: |
          cargo bench --bench s1_counter -- --output-format bencher | tee bench.txt

      - name: Convert Criterion estimates to dashboard JSON
        working-directory: harnesses/rust
        run: |
          mean_ns=$(jq '.mean.point_estimate' target/criterion/s1_counter_add/new/estimates.json)
          stderr_ns=$(jq '.mean.standard_error' target/criterion/s1_counter_add/new/estimates.json)
          jq -n --argjson v "$mean_ns" --argjson r "$stderr_ns" \
            '[{name:"s1_counter_add", unit:"ns", value:$v, range:$r}]' > result.json
          cat result.json

      - name: Restore Cargo.toml
        run: git checkout -- harnesses/rust/Cargo.toml

      - name: Publish to dashboard
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'rust / S1 (opentelemetry ${{ inputs.version }})'
          tool: 'customSmallerIsBetter'
          output-file-path: harnesses/rust/result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: 'dev/bench'
