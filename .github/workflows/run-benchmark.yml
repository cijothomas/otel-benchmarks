name: run-benchmark

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language harness to run'
        required: true
        type: choice
        default: dotnet
        options:
          - dotnet
          - rust
          - java
      version:
        description: 'Package version to measure (e.g. 10.0.8 for System.Diagnostics.DiagnosticSource, 0.32.0 for opentelemetry, 1.51.0 for opentelemetry-api)'
        required: true
        type: string
        default: '10.0.8'

permissions:
  contents: write
  deployments: write

jobs:
  dotnet:
    if: inputs.language == 'dotnet'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run BenchmarkDotNet
        working-directory: harnesses/dotnet/OtelBenchmarks.Dotnet
        run: |
          dotnet run -c Release \
            -p:SystemDiagnosticsDiagnosticSourceVersion=${{ inputs.version }} \
            -- --exporters json --filter '*'

      - name: Collect environment metadata
        id: meta
        run: |
          image="${ImageOS:-${{ runner.os }}}"
          runtime=".NET $(dotnet --version)"
          cpu=$(grep -m1 'model name' /proc/cpuinfo | sed 's/.*: //')
          kernel=$(uname -r)
          extra=$(printf 'runner=%s\nruntime=%s\ncpu=%s\nkernel=%s\nframework=BenchmarkDotNet 0.14.0' \
            "$image" "$runtime" "$cpu" "$kernel")
          {
            echo 'extra<<__END__'
            echo "$extra"
            echo '__END__'
          } >> "$GITHUB_OUTPUT"
          echo "$extra"

      - name: Build result.json files from BenchmarkDotNet report
        working-directory: harnesses/dotnet/OtelBenchmarks.Dotnet
        env:
          EXTRA: ${{ steps.meta.outputs.extra }}
        run: |
          ls BenchmarkDotNet.Artifacts/results/
          # BenchmarkDotNet writes one JSON per type: <Type>-report-full-compressed.json
          s1_report=BenchmarkDotNet.Artifacts/results/OtelBenchmarks.Dotnet.S1CounterApiOnly-report-full-compressed.json
          s1b_report=BenchmarkDotNet.Artifacts/results/OtelBenchmarks.Dotnet.S1bCounterApiOnlyGuarded-report-full-compressed.json
          # S1
          s1_mean=$(jq '.Benchmarks[0].Statistics.Mean' "$s1_report")
          s1_alloc=$(jq '.Benchmarks[0].Memory.BytesAllocatedPerOperation // 0' "$s1_report")
          jq -n --arg extra "$EXTRA" --argjson v "$s1_mean" --argjson a "$s1_alloc" \
            '[
              {name:"s1_counter_add", unit:"ns", value:$v, extra:$extra},
              {name:"s1_counter_add allocations", unit:"B/op", value:$a, extra:$extra}
            ]' > result-s1.json
          cat result-s1.json
          # S1b
          s1b_mean=$(jq '.Benchmarks[0].Statistics.Mean' "$s1b_report")
          s1b_alloc=$(jq '.Benchmarks[0].Memory.BytesAllocatedPerOperation // 0' "$s1b_report")
          jq -n --arg extra "$EXTRA" --argjson v "$s1b_mean" --argjson a "$s1b_alloc" \
            '[
              {name:"s1b_counter_add_guarded", unit:"ns", value:$v, extra:$extra},
              {name:"s1b_counter_add_guarded allocations", unit:"B/op", value:$a, extra:$extra}
            ]' > result-s1b.json
          cat result-s1b.json

      - name: Publish S1 to dashboard
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'dotnet / S1 (System.Diagnostics.DiagnosticSource ${{ inputs.version }})'
          tool: 'customSmallerIsBetter'
          output-file-path: harnesses/dotnet/OtelBenchmarks.Dotnet/result-s1.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: 'dev/bench'

      - name: Publish S1b to dashboard
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'dotnet / S1b (System.Diagnostics.DiagnosticSource ${{ inputs.version }})'
          tool: 'customSmallerIsBetter'
          output-file-path: harnesses/dotnet/OtelBenchmarks.Dotnet/result-s1b.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: 'dev/bench'

  rust:
    if: inputs.language == 'rust'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Pin opentelemetry version
        working-directory: harnesses/rust
        run: |
          sed -i 's|^opentelemetry = .*|opentelemetry = "${{ inputs.version }}"|' Cargo.toml
          grep '^opentelemetry' Cargo.toml

      - name: Run Criterion benchmark
        working-directory: harnesses/rust
        run: |
          cargo bench --bench s1_counter -- --output-format bencher | tee bench.txt

      - name: Collect environment metadata
        id: meta
        run: |
          image="${ImageOS:-${{ runner.os }}}"
          runtime=$(rustc --version)
          cpu=$(grep -m1 'model name' /proc/cpuinfo | sed 's/.*: //')
          kernel=$(uname -r)
          extra=$(printf 'runner=%s\nruntime=%s\ncpu=%s\nkernel=%s\nframework=Criterion 0.5' \
            "$image" "$runtime" "$cpu" "$kernel")
          {
            echo 'extra<<__END__'
            echo "$extra"
            echo '__END__'
          } >> "$GITHUB_OUTPUT"
          echo "$extra"

      - name: Convert Criterion estimates to dashboard JSON
        working-directory: harnesses/rust
        env:
          EXTRA: ${{ steps.meta.outputs.extra }}
        run: |
          mean_ns=$(jq '.mean.point_estimate' target/criterion/s1_counter_add/new/estimates.json)
          stderr_ns=$(jq '.mean.standard_error' target/criterion/s1_counter_add/new/estimates.json)
          jq -n --arg extra "$EXTRA" --argjson v "$mean_ns" --argjson r "$stderr_ns" \
            '[{name:"s1_counter_add", unit:"ns", value:$v, range:$r, extra:$extra}]' > result.json
          cat result.json

      - name: Restore Cargo.toml
        run: git checkout -- harnesses/rust/Cargo.toml

      - name: Publish to dashboard
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'rust / S1 (opentelemetry ${{ inputs.version }})'
          tool: 'customSmallerIsBetter'
          output-file-path: harnesses/rust/result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: 'dev/bench'

  java:
    if: inputs.language == 'java'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JMH benchmark
        working-directory: harnesses/java
        run: |
          gradle jmh -PotelApiVersion=${{ inputs.version }} --no-daemon

      - name: Collect environment metadata
        id: meta
        run: |
          image="${ImageOS:-${{ runner.os }}}"
          runtime="$(java -version 2>&1 | head -n1 | tr -d '"')"
          cpu=$(grep -m1 'model name' /proc/cpuinfo | sed 's/.*: //')
          kernel=$(uname -r)
          extra=$(printf 'runner=%s\nruntime=%s\ncpu=%s\nkernel=%s\nframework=JMH' \
            "$image" "$runtime" "$cpu" "$kernel")
          {
            echo 'extra<<__END__'
            echo "$extra"
            echo '__END__'
          } >> "$GITHUB_OUTPUT"
          echo "$extra"

      - name: Convert JMH result to dashboard JSON
        working-directory: harnesses/java
        env:
          EXTRA: ${{ steps.meta.outputs.extra }}
        run: |
          score=$(jq '.[0].primaryMetric.score' build/results/jmh/result.json)
          error=$(jq '.[0].primaryMetric.scoreError' build/results/jmh/result.json)
          jq -n --arg extra "$EXTRA" --argjson v "$score" --argjson r "$error" \
            '[{name:"s1_counter_add", unit:"ns", value:$v, range:$r, extra:$extra}]' > result.json
          cat result.json

      - name: Publish to dashboard
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'java / S1 (opentelemetry-api ${{ inputs.version }})'
          tool: 'customSmallerIsBetter'
          output-file-path: harnesses/java/result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: 'dev/bench'
